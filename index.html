<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Chatbot - Hack-O-Week</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Symbiosis Support Bot</div>
        
        <div class="chat-window" id="chatWindow">
            <div class="msg bot-msg">Hello! I am your institutional assistant. How can I help you?</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your query here...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
